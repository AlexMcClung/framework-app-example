<script type="module">

import {define} from "./_observablehq/client.b295929c.js";
import {registerFile} from "./_observablehq/stdlib.ba831d4f.js";

registerFile("./data/data_citz.csv", {"name":"./data/data_citz.csv","mimeType":"text/csv","path":"./_file/data/data_citz.673eb740.csv","lastModified":1775585634683,"size":4207});
registerFile("./data/data_gender.csv", {"name":"./data/data_gender.csv","mimeType":"text/csv","path":"./_file/data/data_gender.d42354f7.csv","lastModified":1775585616341,"size":2874});

define({id: "c0b58e41", inputs: ["FileAttachment"], outputs: ["genderData","citzData"], body: (FileAttachment) => {
// Import data
const genderData = FileAttachment("./data/data_gender.csv").csv({typed: true})
const citzData = FileAttachment("./data/data_citz.csv").csv({typed: true})
return {genderData,citzData};
}});

define({id: "bf2771c5", inputs: ["view","Inputs"], outputs: ["selectedLevel"], body: (view,Inputs) => {
// Create and display user input for degree level
const selectedLevel = view(Inputs.select(["Associates","Bachelors","Masters","PhD"], {value: "Bachelors", label: "Select degree level:"}))
return {selectedLevel};
}});

define({id: "aec770a4", inputs: ["view","Inputs"], outputs: ["selectedDemo"], body: (view,Inputs) => {
// Create and display user input for subgroup
const selectedDemo = view(Inputs.radio(["Gender", "Citizenship"], {value: "Gender", label: "Select subgroup:"}))
return {selectedDemo};
}});

define({id: "cb987be7", inputs: ["selectedDemo","genderData","citzData","selectedLevel"], outputs: ["sourceData","tableData"], body: (selectedDemo,genderData,citzData,selectedLevel) => {
// Choose and subset data based on user input
const sourceData = selectedDemo === "Gender" ? genderData : citzData;
const tableData = sourceData.filter((d) => d.Level === selectedLevel);
return {sourceData,tableData};
}});

define({id: "829d724d", inputs: ["Plot","tableData","display"], body: async (Plot,tableData,display) => {
display(await(
// Plot data user selected data
Plot.plot({
  marginLeft: 70,
  x: {type: "band", label: "Fiscal Year"},
  y: {label: "Degrees awarded"},
  marks: [
    Plot.rectY(
      tableData, {
      x: (d) => String(d.Year),
      y: "Degrees",
      fill: "Group",
      tip: true
    }
    ),
  ],
})
))
}});

define({id: "2c97a972", inputs: ["aq","sourceData"], outputs: ["dataPivoted"], body: (aq,sourceData) => {
const dataPivoted = aq
  .from(sourceData)
  .groupby(["Year", "Level"])
  .pivot("Group", "Degrees")
  .objects();
return {dataPivoted};
}});

define({id: "7f6a3596", inputs: ["dataPivoted","selectedDemo"], outputs: ["withTotal"], body: (dataPivoted,selectedDemo) => {
const withTotal = dataPivoted.map(row => ({
  ...row,
  Year: String(row.Year),
  Total: selectedDemo === "Gender" 
    ? row.Men + row.Women 
    : row["Nonresident Alien"] + row["US Cit Perm Res"]
}));
return {withTotal};
}});

define({id: "1723589b", inputs: ["view","Inputs","withTotal"], outputs: ["search"], body: (view,Inputs,withTotal) => {
const search = view(Inputs.search(withTotal)) 
return {search};
}});

define({id: "253603df", inputs: ["Inputs","search","display"], body: async (Inputs,search,display) => {
display(await(
Inputs.table(search, {select: false, maxWidth: "60%"})
))
}});

</script>
